<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaRaIn Calculadora</title>

<style>
body{
font-family: Arial, sans-serif;
background:#f5f0ff;
padding:20px;
color:#333;
}

.container{
max-width:400px;
margin:auto;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

h1{
text-align:center;
color:#6c3cc9;
}

input{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:20px;
border-radius:12px;
border:1px solid #ccc;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#6c3cc9;
color:white;
border:none;
border-radius:15px;
font-size:18px;
font-weight:bold;
}

.resultado{
margin-top:25px;
background: linear-gradient(to right,#fff0f7,#f3e9ff);
padding:30px;
border-radius:25px;
text-align:center;
border:2px solid #f2c6e3;
box-shadow:0 4px 15px rgba(212,139,179,0.2);
}

.resultado .titulo{
font-size:18px;
color:#999;
margin-bottom:10px;
}

.resultado .precio{
font-size:42px;
font-weight:bold;
color:#6c3cc9;
}

</style>

</head>

<body>

<div class="container">

<h1>💖 SaRaIn Calculadora</h1>

<label>💵 Precio producto USD</label> <input type="number" id="precio">

<label>💲 TRM del día</label> <input type="number" id="trm">

<button onclick="calcular()">✨ Calcular Precio</button>

<div class="resultado" id="resultado">
🛍️ Resultado aquí
</div>

</div>

<script>

function calcular(){

let precio = parseFloat(document.getElementById('precio').value);
let trm = parseFloat(document.getElementById('trm').value);

let totalUSD = precio + (precio*0.07) + (precio*0.20) + 3;

let totalCOP = totalUSD * trm;

let final = totalCOP * 1.60;

document.getElementById('resultado').innerHTML =

<div class="resultado" id="resultado"> <div class="titulo">🛍️ RESUMEN</div> <div class="precio">$0</div> </div>

"<p>💵 Producto: $" + precio.toFixed(2) + " USD</p>" +

"<p>🧾 Impuesto 7%: $" + (precio*0.07).toFixed(2) + " USD</p>" +

"<p>🛍️ Shopper 20%: $" + (precio*0.20).toFixed(2) + " USD</p>" +

"<p>🚚 Envío: $3 USD</p>" +

"<hr>" +

"<p>🇨🇴 Total COP: $" + totalCOP.toLocaleString('es-CO') + "</p>" +

"<div class='precio'>💖 $" + final.toLocaleString('es-CO') + "</div>";



}

</script>

</body>
</html>
